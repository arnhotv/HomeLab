---
# -- (Optional) When using a custom network
# networks:
#   your-custom-network:
#     -- (Optional) When attaching an external network
#     external: true
services:
  twingate_connector:
    container_name: twingate_connector
    image: twingate/connector:latest
    environment:
      - TWINGATE_NETWORK= # Your TwinGate Network Name
      - TWINGATE_ACCESS_TOKEN= # Your TwinGate Access Token
      - TWINGATE_REFRESH_TOKEN= # Your TwinGate Refresh Token
      # -- (Optional) Change loglevel
      # - TWINGATE_LOG_LEVEL=3
      # -- (Optional) Add custom DNS Server
      - TWINGATE_DNS=192.168.1.173
    sysctls:
      net.ipv4.ping_group_range: "0 2147483647"
    # -- (Optional) When using a custom network
    # networks:
    #   - your-custom-network
    restart: unless-stopped